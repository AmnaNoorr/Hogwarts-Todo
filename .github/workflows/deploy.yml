name: Build and Deploy

on:
  push:
    branches: [ main ]  # This runs every time you push to the 'main' branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # You can change this to your Node version

      - name: Install and Build
        run: |
          npm ci
          
  deploy:
    needs: build # This makes sure the build FINISHES before deploy starts
    runs-on: ubuntu-latest
    steps:
      - name: Deploy step
        run: echo "Insert your specific deploy command here (like a script or firebase deploy)"
